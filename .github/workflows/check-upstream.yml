name: Check Upstream Updates

on:
  schedule:
    # 02:00 UTC+8 = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      new_commits: ${{ steps.check.outputs.new_commits }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/freewine/doc-translator.git
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          NEW_COMMITS=$(git log main..upstream/main --oneline)
          if [ -n "$NEW_COMMITS" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            # escape newlines for output
            NEW_COMMITS_ESCAPED="${NEW_COMMITS//$'\n'/'\\n'}"
            echo "new_commits=$NEW_COMMITS_ESCAPED" >> $GITHUB_OUTPUT
            echo "Found new commits:"
            echo "$NEW_COMMITS"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No new commits from upstream"
          fi

      - name: Create PR if updates found
        if: steps.check.outputs.has_updates == 'true'
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sync/upstream-$(date +%Y%m%d)"

          # Delete remote branch if already exists (retry safety)
          git push origin --delete $BRANCH 2>/dev/null || true

          # Create sync branch and merge
          git checkout -b $BRANCH
          git merge upstream/main --no-edit

          # Push branch
          git push origin $BRANCH

          # Create PR via REST API (GraphQL createPullRequest blocked for schedule triggers)
          PR_BODY="## Upstream Updates Detected\n\nAuto-synced from [freewine/doc-translator](https://github.com/freewine/doc-translator).\n\n### New Commits\n\`\`\`\n${{ steps.check.outputs.new_commits }}\n\`\`\`\n\n### Next Steps\n1. Review changes above\n2. Merge this PR to trigger CI + Deploy"

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "{
              \"title\": \"chore: sync upstream updates $(date +%Y-%m-%d)\",
              \"body\": \"$PR_BODY\",
              \"head\": \"$BRANCH\",
              \"base\": \"main\"
            }"

      - name: Notify WeChat - updates found
        if: steps.check.outputs.has_updates == 'true'
        run: |
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"## 📦 上游有新更新\n\n**项目**: sgp-doc-translation\n**时间**: $(date '+%Y-%m-%d %H:%M') UTC+8\n\n**新 Commits**:\n\`\`\`\n${{ steps.check.outputs.new_commits }}\n\`\`\`\n\n> 已自动创建 PR，请前往 GitHub 确认并合并以触发部署。\n> [查看 PR](https://github.com/louisleo234/doc-translator/pulls)\"
              }
            }"

      - name: Notify WeChat - no updates
        if: steps.check.outputs.has_updates == 'false'
        run: |
          echo "No updates, skipping WeChat notification"
