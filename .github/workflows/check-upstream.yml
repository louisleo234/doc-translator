name: Check Upstream Updates

on:
  schedule:
    # 02:00 UTC+8 = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/freewine/doc-translator.git
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          NEW_COMMITS=$(git log main..upstream/main --oneline)
          if [ -n "$NEW_COMMITS" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            NEW_COMMITS_ESCAPED="${NEW_COMMITS//$'\n'/'\\n'}"
            echo "new_commits=$NEW_COMMITS_ESCAPED" >> $GITHUB_OUTPUT
            echo "Found new commits:"
            echo "$NEW_COMMITS"
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "No new commits from upstream"
          fi

      - name: Prepare sync branch
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sync/upstream-$(date +%Y%m%d)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

          # Delete remote branch if exists (retry safety)
          git push origin --delete $BRANCH 2>/dev/null || true

          git checkout -b $BRANCH
          git merge upstream/main --no-edit

      - name: Set up Python & run tests
        if: steps.check.outputs.has_updates == 'true'
        id: tests
        run: |
          pip install uv -q
          cd backend
          uv sync --dev -q
          uv run pytest tests/ -q --tb=short 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Auto-merge to main (tests passed)
        if: steps.check.outputs.has_updates == 'true' && steps.tests.outputs.exit_code == '0'
        run: |
          git checkout main
          git merge $BRANCH --no-edit
          git push origin main

      - name: Notify WeChat - auto deployed
        if: steps.check.outputs.has_updates == 'true' && steps.tests.outputs.exit_code == '0'
        run: |
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"## ✅ 上游更新已自动同步部署\n\n**项目**: sgp-doc-translation\n**时间**: $(date '+%Y-%m-%d %H:%M') UTC\n\n**新 Commits**:\n\`\`\`\n${{ steps.check.outputs.new_commits }}\n\`\`\`\n\n> 单测通过，已自动合并并触发部署流水线。\"
              }
            }"

      - name: Create PR (tests failed - needs manual review)
        if: steps.check.outputs.has_updates == 'true' && steps.tests.outputs.exit_code != '0'
        run: |
          git push origin $BRANCH

          TAIL=$(tail -20 backend/test_output.txt 2>/dev/null || echo "no output")

          # Write PR body to file to avoid JSON escaping issues
          cat > /tmp/pr_body.json << EOF
          {
            "title": "chore: sync upstream updates $(date +%Y-%m-%d) [TEST FAILED]",
            "body": "## ⚠️ 上游更新 - 单测失败，需人工处理\n\n### New Commits\n\`\`\`\n${{ steps.check.outputs.new_commits }}\n\`\`\`\n\n### 测试失败摘要\n请查看 [Actions 日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
            "head": "$BRANCH",
            "base": "main"
          }
          EOF

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            --data-binary @/tmp/pr_body.json

      - name: Notify WeChat - test failed needs review
        if: steps.check.outputs.has_updates == 'true' && steps.tests.outputs.exit_code != '0'
        run: |
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"## ⚠️ 上游有更新但单测失败\n\n**项目**: sgp-doc-translation\n**时间**: $(date '+%Y-%m-%d %H:%M') UTC\n\n**新 Commits**:\n\`\`\`\n${{ steps.check.outputs.new_commits }}\n\`\`\`\n\n> 已自动建 PR，请人工检查后合并。\n> [查看 PR](https://github.com/louisleo234/doc-translator/pulls)\"
              }
            }"
