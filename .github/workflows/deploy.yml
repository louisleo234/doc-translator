name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Node.js for CDK
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CDK dependencies
        run: |
          cd ecs
          npm ci

      - name: Notify WeChat - deploy started
        run: |
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"## 🚀 开始部署\n\n**项目**: sgp-doc-translation\n**触发**: ${{ github.event_name }}\n**Commit**: \`${{ github.sha }}\`\n**时间**: $(date '+%Y-%m-%d %H:%M') UTC\n\n> 部署进行中，请稍候...\"
              }
            }"

      - name: CDK Deploy
        id: deploy
        run: |
          cd ecs
          npx cdk deploy \
            -c s3Bucket=${{ vars.S3_BUCKET }} \
            -c "jwtSecret=${{ secrets.JWT_SECRET }}" \
            -c region=${{ vars.AWS_REGION }} \
            -c enableInternalAlb=true \
            -c vpcCidr=${{ vars.VPC_CIDR }} \
            -c "internalAlbSourceCidr=${{ vars.INTERNAL_ALB_SOURCE_CIDR }}" \
            --require-approval never \
            --outputs-file cdk-outputs.json 2>&1 | tee deploy_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Notify WeChat - deploy success
        if: steps.deploy.outputs.exit_code == '0'
        run: |
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"## ✅ 部署成功\n\n**项目**: sgp-doc-translation\n**Commit**: \`$(echo '${{ github.sha }}' | cut -c1-7)\`\n**时间**: $(date '+%Y-%m-%d %H:%M') UTC\n\n**访问地址**:\n- 公网: http://${{ vars.PUBLIC_ALB_DNS }}\n- 内网: http://${{ vars.INTERNAL_ALB_DNS }}\n\n> [查看部署详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"

      - name: Notify WeChat - deploy failed
        if: steps.deploy.outputs.exit_code != '0'
        run: |
          curl -s -X POST "${{ secrets.WECHAT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"content\": \"## ❌ 部署失败\n\n**项目**: sgp-doc-translation\n**Commit**: \`$(echo '${{ github.sha }}' | cut -c1-7)\`\n**时间**: $(date '+%Y-%m-%d %H:%M') UTC\n\n> [查看错误日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }"
          exit 1
